<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AetherCode S.A — Construimos, modernizamos y damos soporte a software empresarial">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050717"/>
      <stop offset="0.55" stop-color="#0A1230"/>
      <stop offset="1" stop-color="#16224A"/>
    </linearGradient>

    <linearGradient id="orbit" x1="20" y1="180" x2="180" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4DC8E8"/>
      <stop offset="0.55" stop-color="#5B7BE8"/>
      <stop offset="1" stop-color="#2E2A6B"/>
    </linearGradient>

    <linearGradient id="aLetter" x1="60" y1="150" x2="140" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FAFAF6"/>
      <stop offset="1" stop-color="#5B7BE8"/>
    </linearGradient>

    <linearGradient id="titleAccent" x1="0" y1="0" x2="240" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4DC8E8"/>
      <stop offset="1" stop-color="#5B7BE8"/>
    </linearGradient>

    <radialGradient id="halo" cx="0.18" cy="0.5" r="0.45">
      <stop offset="0" stop-color="#5B7BE8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#5B7BE8" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 L 0 40" fill="none" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>

    <radialGradient id="gridMask" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0.3" stop-color="white" stop-opacity="1"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <mask id="gridFade">
      <rect width="1280" height="320" fill="url(#gridMask)"/>
    </mask>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#grid)" mask="url(#gridFade)"/>
  <rect width="1280" height="320" fill="url(#halo)"/>

  <g transform="translate(1080, 160)" opacity="0.7">
    <circle cx="0" cy="0" r="150" fill="none" stroke="#5B7BE8" stroke-opacity="0.22" stroke-width="1"/>
    <circle cx="0" cy="0" r="210" fill="none" stroke="#4DC8E8" stroke-opacity="0.18" stroke-width="1" stroke-dasharray="4 7"/>
    <circle cx="-106" cy="-106" r="3" fill="#4DC8E8"/>
    <circle cx="148" cy="0" r="2" fill="#5B7BE8"/>
    <circle cx="0" cy="-150" r="2" fill="#FAFAF6" fill-opacity="0.6"/>
  </g>

  <g transform="translate(110, 80) scale(0.8)">
    <path d="M 100 18 A 82 82 0 1 0 182 100" stroke="url(#orbit)" stroke-width="3.4" stroke-linecap="round" fill="none"/>
    <path d="M 100 182 A 82 82 0 0 0 168 142" stroke="url(#orbit)" stroke-width="3.4" stroke-linecap="round" opacity="0.85" fill="none"/>

    <circle cx="33" cy="125" r="5" fill="#FAFAF6" stroke="#4DC8E8" stroke-width="2.4"/>
    <circle cx="167" cy="125" r="5" fill="#FAFAF6" stroke="#5B7BE8" stroke-width="2.4"/>
    <circle cx="100" cy="18" r="3" fill="#4DC8E8"/>

    <path d="M 100 48 L 68 142 L 82 142 L 89 122 L 111 122 L 118 142 L 132 142 L 100 48 Z M 93 110 L 100 86 L 107 110 Z" fill="url(#aLetter)"/>

    <g fill="#5B7BE8">
      <circle cx="138" cy="42" r="3"/>
      <circle cx="148" cy="34" r="2.4"/>
      <circle cx="156" cy="44" r="1.8"/>
      <circle cx="160" cy="28" r="2"/>
      <circle cx="170" cy="36" r="1.4"/>
      <circle cx="146" cy="52" r="1.6"/>
      <circle cx="166" cy="52" r="1.2"/>
      <circle cx="154" cy="22" r="1.2"/>
    </g>
  </g>

  <g transform="translate(330, 0)">
    <g transform="translate(0, 95)">
      <circle cx="5" cy="5" r="4" fill="#4DC8E8"/>
      <text x="20" y="10" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" font-weight="500" fill="#FAFAF6" fill-opacity="0.6" letter-spacing="1.5">AETHERCODE · S.A</text>
    </g>

    <text x="0" y="180" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="68" font-weight="700" fill="#FAFAF6" letter-spacing="-1.8">
      <tspan>Aether</tspan><tspan fill="url(#titleAccent)" font-weight="600">Code</tspan>
    </text>

    <text x="0" y="225" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" fill="#FAFAF6" fill-opacity="0.75">Construimos, modernizamos y damos soporte</text>
    <text x="0" y="255" font-family="'Instrument Serif', 'Times New Roman', Georgia, serif" font-style="italic" font-size="24" fill="#4DC8E8">a software empresarial.</text>

    <g transform="translate(0, 285)">
      <line x1="0" y1="0" x2="40" y2="0" stroke="#FAFAF6" stroke-opacity="0.25" stroke-width="1"/>
      <text x="52" y="5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#FAFAF6" fill-opacity="0.45" letter-spacing="1.2">aethercode.co  ·  Bogotá  ·  LATAM</text>
    </g>
  </g>
</svg>
